{{template "header" .}}
<div style="max-width: 800px; margin: 0 auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px; color: #00529F;">{{.Action}} Noticia</h2>
    
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Título:</label>
            <input type="text" name="title" value="{{.News.Title}}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Resumen (Aparece en la lista de noticias):</label>
            <input type="text" name="summary" value="{{.News.Summary}}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">URL de la Imagen (ej. /img/noticia.jpg):</label>
            <input type="text" name="image_url" value="{{.News.ImageURL}}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Contenido de la Noticia:</label>
            <textarea name="content" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; min-height: 200px;">{{.News.Content}}</textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="hero__btn" style="flex: 1;">Guardar Noticia</button>
            <a href="/noticias" class="hero__btn hero__btn--secondary" style="flex: 1; text-align: center;">Cancelar</a>
        </div>
    </form>
</div>
{{template "footer" .}}
