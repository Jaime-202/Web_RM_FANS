{{template "header" .}}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 20px;">Registro de Usuario</h2>
    
    {{if .Error}}
    <div style="color: red; margin-bottom: 15px; text-align: center;">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/register">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">Usuario:</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Contraseña:</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <button type="submit" class="hero__btn" style="width: 100%;">Registrarse</button>
    </form>
    <div style="margin-top: 15px; text-align: center;">
        <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
</div>
{{template "footer" .}}
